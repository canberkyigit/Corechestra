<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 38" fill="none">
  <!-- Corechestra — 5 figures in orchestra arch formation -->
  <!-- Far left: shortest -->
  <rect x="1"  y="26" width="6" height="12" rx="3" fill="#4F46E5"/>
  <!-- Mid left -->
  <rect x="10" y="18" width="6" height="20" rx="3" fill="#4F46E5"/>
  <!-- Center: conductor, tallest -->
  <rect x="19" y="10" width="6" height="28" rx="3" fill="#4F46E5"/>
  <!-- Mid right -->
  <rect x="28" y="18" width="6" height="20" rx="3" fill="#4F46E5"/>
  <!-- Far right: shortest -->
  <rect x="37" y="26" width="6" height="12" rx="3" fill="#4F46E5"/>
</svg>
